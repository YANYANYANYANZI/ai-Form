version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aiform_postgres
    restart: always
    environment:
      POSTGRES_USER: aiform_user
      POSTGRES_PASSWORD: aiform_pass
      POSTGRES_DB: aiform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aiform_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: